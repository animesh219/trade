version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradeflow
      POSTGRES_PASSWORD: tradeflow
      POSTGRES_DB: tradeflow
    ports:
      - '5432:5432'
    volumes:
      - tradeflow_pgdata:/var/lib/postgresql/data

volumes:
  tradeflow_pgdata:
